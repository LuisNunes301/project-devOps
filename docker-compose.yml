version: '3.8'

networks:
  corp_network:
    driver: bridge

services:
  # --- CAMADA 3: BANCO DE DADOS ---
  oracle_db:
    image: gvenzl/oracle-xe:slim
    container_name: oracle_db
    restart: always
    networks:
      - corp_network
    environment:
      - ORACLE_PASSWORD=${DB_PASSWORD}

  # --- CAMADA 2: BACKEND (API) ---
  java_api:
    image: springio/gs-spring-boot-docker
    container_name: java_api
    restart: always
    networks:
      - corp_network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle_db:1521/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      - oracle_db

  # --- CAMADA 1: FRONTEND E WAF (A Borda) ---
  web_borda:
    image: nginx:latest
    container_name: web_borda
    restart: always
    ports:
      - "80:80"
    networks:
      - corp_network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - java_api

  # --- CAMADA DE OBSERVABILIDADE ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    networks:
      - corp_network
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    networks:
      - corp_network
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    networks:
      - corp_network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus